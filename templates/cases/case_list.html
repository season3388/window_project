{% extends 'base.html' %}
{% block title %}工程案例{% endblock %}
{% block content %}
<h1>工程案例</h1>
<hr>

<div class="row">
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">太古城 - 全屋鋁窗防水</h5>
                <p class="card-text">更換防水膠邊、窗框打膠</p>
                <span class="badge bg-success">防水工程</span>
                <div class="mt-3">
                    <a href="/cases/taikoo-shing/" class="btn btn-outline-primary btn-sm">查看詳情 →</a>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">黃埔花園 - 強制驗窗</h5>
                <p class="card-text">更換7副不鏽鋼窗鉸，符合屋宇署標準</p>
                <span class="badge bg-primary">強制驗窗</span>
                <div class="mt-3">
                    <a href="/cases/whampoa-garden/" class="btn btn-outline-primary btn-sm">查看詳情 →</a>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">麗港城 - 緊急維修</h5>
                <p class="card-text">颱風後窗扇鬆脫，即日加固</p>
                <span class="badge bg-danger">緊急維修</span>
                <div class="mt-3">
                    <a href="/cases/laguna-city/" class="btn btn-outline-primary btn-sm">查看詳情 →</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
