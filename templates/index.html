{% extends 'base.html' %}
{% block content %}
<div class="text-center py-5">
    <h1 class="text-primary mb-4">一站式驗窗．維修．提交屋宇署報告</h1>
    <p class="fs-5">專業註冊承建商 | QP 合資格人士 | 符合香港法例第123章</p>
    <a href="/booking/" class="btn btn-danger btn-lg mt-3">立即預約上門驗窗</a>
</div>
<div class="row mt-5">
    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h3>強制驗窗</h3>
            <p>屋宇署認可檢驗，提供法定報告</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h3>鋁窗維修</h3>
            <p>更換配件、防水、翻新、緊急維修</p>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h3>代交報告</h3>
            <p>一條龍服務，直接提交屋宇署</p>
        </div>
    </div>
</div>
{% endblock %}
