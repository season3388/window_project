{% extends "base.html" %}

{% block title %}用戶登入 - 香港驗窗維修工程{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6 col-lg-5"> <!-- 稍微縮窄寬度，讓卡片比例在桌面端更精緻 -->
        <div class="card shadow border-0"> <!-- 加上 shadow 陰影與去邊框，質感大幅提升 -->
            <div class="card-body p-4">
                <h2 class="text-center mb-4" style="color: #003366; font-weight: bold;">會員登入</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- ✅ 強行覆蓋 Next 機制：登入成功後一律強行送回首頁 '/' -->
                    <input type="hidden" name="next" value="/">
                    
                    <!-- 登入失敗時顯示紅框錯誤提示 -->
                    {% if form.errors %}
                        <div class="alert alert-danger py-2">用戶名或密碼不正確，請重新輸入。</div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #003366;">用戶名 (Username)</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="color: #003366;">密碼 (Password)</label>
                        {{ form.password }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3 fw-bold py-2 shadow-sm" style="background-color: #003366; border: none;">立即登入</button>
                </form>
                
                <div class="text-center mt-3">
                    <!-- ✅ 核心修復：加上 member: 命名空間，徹底根除 NoReverseMatch 崩潰 -->
                    <p class="mb-0 text-muted">還沒有帳號？ <a href="{% url 'member:register' %}" class="fw-bold" style="color: #003366;">立即註冊</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 💡 套用跟你註冊頁面一樣的完美 CSS 覆蓋，讓 Django 內建輸入框立刻變美 -->
<style>
    form input[type="text"], form input[type="password"] {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }
    form input[type="text"]:focus, form input[type="password"]:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, .25);
    }
</style>
{% endblock %}
